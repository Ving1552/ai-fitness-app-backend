eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL}
spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins: "http://localhost:3000"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/users/**
            - id: activity-service
              uri: lb://activity-service
              predicates:
                - Path=/api/activities/**
            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/recommendations/**
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
server:
  port: 8080
app:
  jwt:
    secret: ${JWT_SECRET}