name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 18
        uses: actions/setup-java@v3
        with:
          java-version: '18'
          distribution: 'temurin'

      - name: Grant mvnw permission
        run: chmod +x mvnw
        working-directory: activityservice

      - name: Run ActivityService tests
        run: ./mvnw test
        working-directory: activityservice

      - name: Print test results on failure
        if: failure()
        run: cat activityservice/target/surefire-reports/*.txt