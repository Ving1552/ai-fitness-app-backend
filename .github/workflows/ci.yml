name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  - name: Grant mvnw permission
      run: chmod +x mvnw
      working-directory: activityservice

        - name: Run ActivityService tests
          run: ./mvnw test
          working-directory: activityservice
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run ActivityService tests
        run: ./mvnw test
        working-directory: activityservice